<!DOCTYPE html>
<html>
 
<head>
<title>Student Record</title>
<link rel="stylesheet" href="LT1.css">
</head>
 
<body>
 
<h1>Student Record Manager</h1>
 
<div class="form-box">
 
<form id="formBox">
 
<input type="text" id="rollInput" placeholder="Roll Number">
 
<input type="text" id="nameInput" placeholder="Student Name">
 
<button id="addStudentBtn" disabled>Add</button>
 
</form>
 
</div>
 
<div class="search-box">
 
<input type="text" id="searchBox" placeholder="Search student">
 
<button id="sortButton">Sort A-Z</button>
 
<button id="topHighlight">Highlight First</button>
 
</div>
 
 
<ul id="listArea"></ul>
 
 
<div class="info">
 
<p id="totalCount">Total students: 0</p>
 
<p id="attendanceCount">Present: 0 , Absent: 0</p>
 
</div>
 
<script src="LT1.js"></script>
 
</body>
 
</html>
